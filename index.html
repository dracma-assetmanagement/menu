<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Fin Silver</title>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:#f2f2f2;color:#1a1a1a;min-height:100vh;}

.hero{text-align:center;padding:60px 20px 40px;}
.hero-brand{font-size:2.8rem;font-weight:800;letter-spacing:4px;text-transform:uppercase;margin-bottom:4px;}
.hero-brand .fin{color:#1a1a1a;}
.hero-brand .silver{color:#999;}
.hero-subtitle{color:#999;font-size:1rem;font-weight:300;letter-spacing:1px;}
.hero-line{width:60px;height:3px;background:#1a1a1a;margin:20px auto 0;border-radius:2px;}

.tools-section{max-width:800px;margin:0 auto;padding:30px 20px 60px;}
.tools-label{font-size:.78rem;font-weight:500;text-transform:uppercase;letter-spacing:2px;color:#999;text-align:center;margin-bottom:20px;}

.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}

.tool-card{
  display:flex;align-items:center;gap:14px;
  padding:20px;background:#fff;border-radius:14px;
  text-decoration:none;color:#1a1a1a;
  border:1.5px solid #eee;
  transition:all .25s;
  cursor:pointer;
}
.tool-card:hover{
  border-color:#ccc;
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(0,0,0,.06);
}
.tool-card:active{transform:translateY(-1px);}

.tool-icon{display:none;}

.tool-info{flex:1;min-width:0;}
.tool-name{font-size:.95rem;font-weight:600;margin-bottom:2px;}
.tool-desc{font-size:.72rem;color:#999;line-height:1.3;}

.tool-arrow{color:#ccc;font-size:1.1rem;transition:color .2s;flex-shrink:0;}
.tool-card:hover .tool-arrow{color:#1a1a1a;}

.footer{text-align:center;padding:30px 20px;color:#ddd;font-size:.72rem;letter-spacing:1px;}

.empty-msg{text-align:center;color:#ccc;font-size:.9rem;padding:40px 20px;}

@media(max-width:500px){
  .hero{padding:40px 16px 30px;}
  .hero-brand{font-size:2rem;}
  .tools-section{padding:20px 14px 40px;}
  .tools-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-brand"><span class="fin">FIN</span> <span class="silver">SILVER</span></div>
  <div class="hero-subtitle">Herramientas gratuitas para tu día a día</div>
  <div class="hero-line"></div>
</div>

<div class="tools-section">
  <div class="tools-label">Nuestras herramientas</div>
  <div class="tools-grid" id="tools-grid"></div>
</div>

<div class="footer">GRUPO FIN-SILVER — Todas las herramientas son gratuitas</div>

<script>
// ============================================================
// ⬇️  EDITÁ ACÁ PARA AGREGAR O SACAR HERRAMIENTAS  ⬇️
// Solo agregá un nuevo objeto con nombre, descripcion, emoji y link
// ============================================================
const herramientas = [
  {
    nombre: "Fin-Silver",
    descripcion: "Calculadora Financiera",
    emoji: "📱",
    link: "https://fin-silver.com/"
  },
  {
    nombre: "Manejo de fondos comunes de inversion",
    descripcion: "Lleva las carteras de tus fondos de la forma mas ordenada posible",
    emoji: "📱",
    link: "https://fondos.fin-silver.com/"
  },
  {
    nombre: "Generador de QR",
    descripcion: "Creá códigos QR desde cualquier URL",
    emoji: "📱",
    link: "https://generadorqr.fin-silver.com/"
  },
  {
    nombre: "Pomodoro",
    descripcion: "Temporizador de productividad",
    emoji: "🍅",
    link: "https://pomodoro.fin-silver.com/"
  },
  {
    nombre: "Calculadora de Tiempo",
    descripcion: "Cuánto pasó desde una fecha",
    emoji: "⏳",
    link: "https://contador-tiempo.fin-silver.com/"
  },
  {
    nombre: "Ruleta de Decisiones",
    descripcion: "Dejá que la suerte decida",
    emoji: "🎯",
    link: "https://ruleta-decisiones.fin-silver.com/"
  },
   {
    nombre: "Cuento Debo",
    descripcion: "Dividí gastos entre amigos",
    emoji: "💰",
    link: "http://cuantodebo.fin-silver.com/"
  },
  {
    nombre: "¿Cuánto Vale Tu Tiempo?",
    descripcion: "Descubrí el valor real de cada minuto",
    emoji: "⏱️",
    link: "http://cuantovaletutiempo.fin-silver.com/"
  },
  {
    nombre: "Compatibilidad de Signos",
    descripcion: "Qué tan compatibles son dos signos",
    emoji: "♈",
    link: "https://compatibilidad_de_signos.fin-silver.com/"
  },
   {
    nombre: "Preveo",
    descripcion: "Juego de Previa",
    emoji: "🍻",
    link: "https://preveo.fin-silver.com/"
  }
  // ⬇️ PARA AGREGAR UNA NUEVA, COPIÁ ESTE FORMATO: ⬇️
  // ,{
  //   nombre: "Nombre de la herramienta",
  //   descripcion: "Breve descripción",
  //   emoji: "🔧",
  //   link: "nombre-archivo.html"
  // }
];
// ============================================================

function renderTools(){
  const grid = document.getElementById('tools-grid');
  if(herramientas.length === 0){
    grid.innerHTML = '<div class="empty-msg">Todavía no hay herramientas</div>';
    return;
  }
  grid.innerHTML = herramientas.map(h => `
    <a class="tool-card" href="${h.link}">
      <div class="tool-icon">${h.emoji}</div>
      <div class="tool-info">
        <div class="tool-name">${h.nombre}</div>
        <div class="tool-desc">${h.descripcion}</div>
      </div>
      <div class="tool-arrow">→</div>
    </a>
  `).join('');
}

renderTools();
</script>
</body>
</html>
